<!--
  RESEND EMAIL TEMPLATE: Athlete — coaching request declined

  Placeholders {{key}} remplacés par lib/coachRequestResponseAthleteEmail.ts (voir lib/emailTemplate.ts).

  Subject (injecté côté app) :
  FR : Demande refusée — {{coachName}}
  EN : Request declined — {{coachName}}
-->
<!DOCTYPE html>
<html lang="{{locale}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{pageTitle}}</title>
</head>
<body style="margin:0; padding:0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background-color: #fafaf9; color: #1c1917;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #fafaf9;">
    <tr>
      <td style="padding: 32px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; border: 1px solid #e7e5e4; box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden;">
          <tr>
            <td style="padding: 40px 24px; background: linear-gradient(135deg, #506648 0%, #627e59 40%, #8e9856 100%); text-align: center;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="vertical-align: middle; text-align: center;">
                    <img src="{{siteUrl}}/logo.png" alt="" width="56" height="56" style="display: inline-block; width: 56px; height: 56px; object-fit: contain; margin-bottom: 12px;" />
                    <span style="display: block; font-size: 22px; font-weight: 700; color: #ffffff; letter-spacing: -0.02em;">My Sport Ally</span>
                    <span style="display: block; font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 4px;">{{tagline}}</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding: 32px 24px;">
              <h1 style="margin: 0 0 12px 0; font-size: 22px; font-weight: 600; color: #506648;">{{heading}}</h1>
              <p style="margin: 0 0 16px 0; font-size: 15px; line-height: 1.6; color: #57534e;">{{introHtml}}</p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin: 0 0 16px 0; background-color: #fafaf9; border: 1px solid #e7e5e4; border-radius: 8px;">
                <tr>
                  <td style="padding: 16px; font-size: 14px; line-height: 1.6; color: #57534e;">
                    <p style="margin: 0 0 8px 0;"><strong style="color: #292524;">{{coachLabel}}</strong> — {{coachName}}</p>
                    <p style="margin: 0 0 8px 0;"><strong style="color: #292524;">{{offerLabel}}</strong> — {{offerTitle}}</p>
                    <p style="margin: 0;"><strong style="color: #292524;">{{dateLabel}}</strong> — {{responseDateLabel}}</p>
                  </td>
                </tr>
              </table>
              {{encouragementHtml}}
              <p style="margin: 0; text-align: center;">
                <a href="{{ctaPageUrl}}" style="display: inline-block; padding: 14px 28px; background-color: #506648; color: #ffffff !important; text-decoration: none; font-size: 15px; font-weight: 600; border-radius: 8px;">{{ctaLabel}}</a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding: 28px 24px; background-color: #f5f5f4; border-top: 1px solid #e7e5e4;">
              <p style="margin: 0 0 16px 0; font-size: 14px; font-weight: 600; color: #506648; text-align: center;">My Sport Ally</p>
              <p style="margin: 0 0 16px 0; font-size: 12px; color: #57534e; text-align: center; line-height: 1.5;">
                <a href="{{homeUrl}}" style="color: #506648; text-decoration: none;">{{homeLinkLabel}}</a> &nbsp;·&nbsp;
                <a href="{{loginUrl}}" style="color: #506648; text-decoration: none;">{{loginLinkLabel}}</a>
              </p>
              <p style="margin: 0 0 16px 0; font-size: 12px; color: #57534e; text-align: center; line-height: 1.5;">
                {{footerNotificationsHtml}}
              </p>
              <p style="margin: 0; font-size: 11px; color: #57534e; text-align: center;">{{copyrightLine}}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
