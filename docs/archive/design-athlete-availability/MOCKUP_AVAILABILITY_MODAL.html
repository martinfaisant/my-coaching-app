<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mockup – Modale Disponibilité / Indisponibilité (design system)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'palette-forest-dark': '#627e59',
            'palette-forest-darker': '#506648',
          }
        }
      }
    }
  </script>
  <style>
    /* FORM_BASE_CLASSES (formStyles.ts) */
    .form-base { @apply w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:border-transparent transition; }
    .form-label { @apply block text-sm font-medium text-stone-700 mb-2; }
  </style>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen p-6">

  <div class="max-w-xl mx-auto mb-2">
    <p class="text-sm text-stone-500">Header avec date + calendrier (comme entraînement). Heures = double Dropdown. Récurrence = Dropdown. Champ Note = design system.</p>
  </div>

  <!-- Modale (taille workout, header comme WorkoutModal) -->
  <div class="max-w-[40.25rem] mx-auto mt-6 rounded-2xl shadow-xl border border-stone-100 bg-white overflow-hidden">

    <!-- Header : date à gauche (composant calendrier) + fermer à droite -->
    <div class="shrink-0 px-6 py-4 border-b border-stone-100 bg-stone-50/50 flex items-center justify-between gap-3">
      <div class="flex items-center gap-2 border border-stone-300 rounded-lg py-1.5 px-3 bg-white focus-within:ring-2 focus-within:ring-palette-forest-dark focus-within:border-transparent transition min-w-0">
        <span class="text-sm font-bold text-stone-900 min-w-[10rem]">lundi 10 mars 2026</span>
        <button type="button" class="shrink-0 p-1 rounded text-stone-400 hover:text-palette-forest-dark hover:bg-stone-100" aria-label="Choisir la date">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        </button>
      </div>
      <button type="button" class="p-2 rounded-lg text-stone-500 hover:bg-stone-100 shrink-0" aria-label="Fermer">✕</button>
    </div>

    <div class="px-6 py-4 space-y-5">
      <!-- Type -->
      <div>
        <label class="form-label">Type</label>
        <div class="flex bg-stone-200 p-0.5 rounded-lg" role="group">
          <button type="button" class="flex-1 px-3 py-2.5 text-sm font-medium rounded-md bg-palette-forest-dark text-white shadow-sm">Disponible</button>
          <button type="button" class="flex-1 px-3 py-2.5 text-sm font-medium rounded-md text-stone-600 hover:bg-stone-50">Indisponible</button>
        </div>
      </div>

      <!-- Heures : double Dropdown (style design system) -->
      <div class="grid grid-cols-2 gap-3">
        <div class="relative">
          <label class="form-label" for="heure-debut">Début</label>
          <button type="button" id="heure-debut" class="form-base flex items-center justify-between gap-2 cursor-pointer text-left min-w-0">
            <span class="truncate">08:00</span>
            <svg class="w-4 h-4 text-stone-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M19 9l-7 7-7-7" /></svg>
          </button>
          <!-- Panneau Dropdown : pas de 15 min (06:00 à 23:45) -->
          <div class="hidden absolute left-0 right-0 z-10 mt-1 py-1 px-1 rounded-lg border border-stone-300 bg-white shadow-lg max-h-64 overflow-y-auto" role="listbox">
            <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer text-stone-500 hover:bg-stone-50 hover:text-palette-forest-dark">07:45</button>
            <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer bg-palette-forest-dark text-white shadow-lg">08:00</button>
            <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer text-stone-500 hover:bg-stone-50 hover:text-palette-forest-dark">08:15</button>
            <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer text-stone-500 hover:bg-stone-50 hover:text-palette-forest-dark">08:30</button>
            <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer text-stone-500 hover:bg-stone-50 hover:text-palette-forest-dark">08:45</button>
            <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer text-stone-500 hover:bg-stone-50 hover:text-palette-forest-dark">09:00</button>
          </div>
        </div>
        <div class="relative">
          <label class="form-label" for="heure-fin">Fin</label>
          <button type="button" id="heure-fin" class="form-base flex items-center justify-between gap-2 cursor-pointer text-left min-w-0">
            <span class="truncate">10:00</span>
            <svg class="w-4 h-4 text-stone-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div class="hidden absolute left-0 right-0 z-10 mt-1 py-1 px-1 rounded-lg border border-stone-300 bg-white shadow-lg max-h-64 overflow-y-auto" role="listbox">
            <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer text-stone-500 hover:bg-stone-50 hover:text-palette-forest-dark">09:45</button>
            <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer bg-palette-forest-dark text-white shadow-lg">10:00</button>
            <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer text-stone-500 hover:bg-stone-50 hover:text-palette-forest-dark">10:15</button>
            <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer text-stone-500 hover:bg-stone-50 hover:text-palette-forest-dark">10:30</button>
          </div>
        </div>
      </div>
      <p class="text-xs text-stone-500 -mt-3">Pas de <strong>15 min</strong> (ex. 06:00 à 23:45).</p>

      <!-- Note (champ design system = Textarea + FORM_LABEL_CLASSES) -->
      <div>
        <label class="form-label" for="note">Note</label>
        <textarea id="note" class="form-base resize-y min-h-[100px]" placeholder="Libre pour une sortie longue…" rows="3"></textarea>
      </div>

      <!-- Récurrence : bloc comme "Objectifs de la séance" -->
      <div class="bg-stone-50 p-4 rounded-xl border border-stone-100">
        <div class="flex items-center justify-between mb-3">
          <div class="text-xs font-bold text-stone-500 uppercase tracking-wide">Récurrence</div>
          <div class="flex bg-stone-200 p-0.5 rounded-lg" role="group">
            <button type="button" class="px-3 py-1.5 text-xs font-medium rounded-md text-stone-600 hover:bg-stone-50">Non récurrent</button>
            <button type="button" class="px-3 py-1.5 text-xs font-medium rounded-md bg-palette-forest-dark text-white shadow-sm">Récurrent</button>
          </div>
        </div>
        <!-- Si récurrent : gauche = fréquence, droite = date de fin -->
        <div class="grid grid-cols-2 gap-3">
          <div class="relative">
            <label class="form-label text-xs">Fréquence</label>
            <button type="button" class="form-base flex items-center justify-between gap-2 cursor-pointer text-left">
              <span class="truncate">1 semaine</span>
              <svg class="w-4 h-4 text-stone-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M19 9l-7 7-7-7" /></svg>
            </button>
            <div class="hidden absolute left-0 right-0 z-10 mt-1 py-1 px-1 rounded-lg border border-stone-300 bg-white shadow-lg" role="listbox">
              <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer bg-palette-forest-dark text-white shadow-lg">1 semaine</button>
              <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer text-stone-500 hover:bg-stone-50 hover:text-palette-forest-dark">2 semaines</button>
              <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer text-stone-500 hover:bg-stone-50 hover:text-palette-forest-dark">3 semaines</button>
              <button type="button" role="option" class="w-full text-left px-4 py-2.5 rounded-lg cursor-pointer text-stone-500 hover:bg-stone-50 hover:text-palette-forest-dark">4 semaines</button>
            </div>
          </div>
          <div>
            <label class="form-label text-xs">Jusqu’au</label>
            <div class="flex items-center gap-2 border border-stone-300 rounded-lg py-2.5 px-3 bg-white focus-within:ring-2 focus-within:ring-palette-forest-dark focus-within:border-transparent">
              <span class="text-sm text-stone-900 flex-1">30 avril 2026</span>
              <button type="button" class="p-1 rounded text-stone-400 hover:bg-stone-100" aria-label="Choisir la date">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="shrink-0 px-6 py-4 border-t border-stone-100 flex gap-3 justify-end">
      <button type="button" class="px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-700 text-sm font-medium hover:bg-stone-100">Annuler</button>
      <button type="button" class="px-4 py-2.5 rounded-lg bg-palette-forest-dark text-white text-sm font-medium hover:bg-palette-forest-darker">Enregistrer</button>
    </div>
  </div>

</body>
</html>
