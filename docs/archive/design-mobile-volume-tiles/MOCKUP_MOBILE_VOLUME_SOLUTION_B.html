<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solution B — Toujours une colonne</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        'palette-forest-dark': '#627e59',
        'palette-olive': '#8e9856',
        'stone': { 50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1', 400: '#a8a29e', 600: '#57534e', 700: '#44403c', 800: '#292524', 900: '#1c1917' }
      }}}
    }
  </script>
</head>
<body class="bg-stone-100 min-h-screen p-4">
  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6">
    <p class="text-xs text-stone-500 mb-4">Mockup — Section « Objectifs et volume par sport ». <strong>Solution B :</strong> grille <code>grid-cols-1</code> partout (desktop et mobile). Tuiles toujours empilées verticalement.</p>

    <h2 class="text-sm font-bold text-stone-900 uppercase tracking-wide mb-3">Objectifs et volume par sport</h2>

    <div class="flex flex-wrap items-center justify-between gap-3 py-2.5 px-3 rounded-xl bg-stone-50 border border-stone-100 mb-4">
      <span class="text-sm font-medium text-stone-700 shrink-0">Temps à allouer / semaine</span>
      <div class="relative w-28 shrink-0">
        <input type="text" value="10" class="w-full pl-3 pr-11 py-2 rounded-lg border border-stone-300 bg-white text-stone-900 text-sm" />
        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 text-sm">h/sem.</span>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-3">
      <div class="rounded-xl border-l-4 border border-stone-200 bg-white p-3 flex flex-wrap items-center justify-between gap-3 border-l-palette-forest-dark">
        <div class="flex items-center gap-2 min-w-0 shrink-0">
          <span class="rounded-full p-1 bg-palette-forest-dark/10 text-palette-forest-dark">🏃</span>
          <span class="text-sm font-semibold text-stone-800">Course</span>
        </div>
        <div class="flex flex-wrap items-center gap-3 ml-auto min-w-0 w-full sm:w-auto justify-end">
          <div class="relative w-28 shrink-0">
            <input type="text" value="2" class="w-full pl-3 pr-12 py-2 rounded-lg border border-stone-300 bg-white text-sm" />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 text-xs whitespace-nowrap">km/sem.</span>
          </div>
          <div class="relative w-28 shrink-0">
            <input type="text" value="400" class="w-full pl-3 pr-14 py-2 rounded-lg border border-stone-300 bg-white text-sm" />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 text-xs whitespace-nowrap">D+/sem.</span>
          </div>
        </div>
      </div>
      <div class="rounded-xl border-l-4 border border-stone-200 bg-white p-3 flex flex-wrap items-center justify-between gap-3 border-l-palette-olive">
        <div class="flex items-center gap-2 min-w-0 shrink-0">
          <span class="rounded-full p-1 bg-palette-olive/20 text-palette-olive">🚴</span>
          <span class="text-sm font-semibold text-stone-800">Vélo</span>
        </div>
        <div class="flex flex-wrap items-center gap-3 ml-auto min-w-0 w-full sm:w-auto justify-end">
          <div class="relative w-28 shrink-0">
            <input type="text" value="43" class="w-full pl-3 pr-12 py-2 rounded-lg border border-stone-300 bg-white text-sm" />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 text-xs whitespace-nowrap">km/sem.</span>
          </div>
        </div>
      </div>
      <div class="rounded-xl border-l-4 border border-stone-200 bg-white p-3 flex flex-wrap items-center justify-between gap-3 border-l-stone-400">
        <div class="flex items-center gap-2 min-w-0 shrink-0">
          <span class="rounded-full p-1 bg-stone-100 text-stone-600">🏋️</span>
          <span class="text-sm font-semibold text-stone-800">Musculation</span>
        </div>
        <div class="flex flex-wrap items-center gap-3 ml-auto min-w-0 w-full sm:w-auto justify-end">
          <div class="relative w-28 shrink-0">
            <input type="text" value="4" class="w-full pl-3 pr-12 py-2 rounded-lg border border-stone-300 bg-white text-sm" />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 text-xs whitespace-nowrap">h/sem.</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
