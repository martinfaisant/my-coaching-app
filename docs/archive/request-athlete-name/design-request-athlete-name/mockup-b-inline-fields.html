<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mockup B — Demande avec Prénom / Nom dans le formulaire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'palette-forest-dark': '#627e59',
            'palette-forest-darker': '#506648',
            'palette-olive': '#8e9856',
            'palette-danger': '#c0564b',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center p-4">
  <div class="fixed inset-0 bg-stone-900/50 backdrop-blur-sm z-[90]" aria-hidden="true"></div>
  <div class="relative z-[100] w-full max-w-md max-h-[90vh] overflow-y-auto">
    <div class="bg-white rounded-xl shadow-xl border border-stone-100">
      <div class="flex justify-end p-3 bg-white rounded-t-xl sticky top-0 z-10">
        <button type="button" class="p-2 rounded-lg hover:bg-stone-200 transition text-stone-500" aria-label="Fermer">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="px-8 pb-8">
        <h2 id="modal-title" class="text-2xl font-semibold text-stone-900 text-center mb-2">
          Envoyer une demande
        </h2>
        <p class="text-sm text-stone-600 text-center mb-6">
          Renseignez vos informations et votre besoin pour que le coach puisse vous répondre.
        </p>

        <form class="space-y-5">
          <!-- Prénom / Nom (nouveaux champs) -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="first_name" class="block text-sm font-medium text-stone-700 mb-2">Prénom</label>
              <input type="text" id="first_name" name="first_name" placeholder="Jean" value=""
                class="w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:border-transparent" />
            </div>
            <div>
              <label for="last_name" class="block text-sm font-medium text-stone-700 mb-2">Nom</label>
              <input type="text" id="last_name" name="last_name" placeholder="Dupont" value=""
                class="w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:border-transparent" />
            </div>
          </div>

          <div>
            <p class="block text-sm font-medium text-stone-700 mb-3">Sports pratiqués</p>
            <div class="flex flex-wrap gap-3">
              <span class="inline-flex items-center px-4 py-2 rounded-full border-2 border-palette-forest-dark bg-palette-forest-dark/10 text-palette-forest-dark text-sm font-medium">Course</span>
              <span class="inline-flex items-center px-4 py-2 rounded-full border-2 border-stone-200 text-stone-600 text-sm">Vélo</span>
              <span class="inline-flex items-center px-4 py-2 rounded-full border-2 border-stone-200 text-stone-600 text-sm">Trail</span>
            </div>
          </div>

          <div>
            <label for="need" class="block text-sm font-medium text-stone-700 mb-2">Votre besoin de coaching</label>
            <textarea id="need" name="need" rows="4" placeholder="Préparer un semi-marathon, progresser en régularité..."
              class="w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:border-transparent resize-y min-h-[100px]"></textarea>
          </div>

          <div class="flex gap-3 pt-2">
            <button type="button" class="flex-1 px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-700 hover:bg-stone-100 transition text-sm font-medium">
              Annuler
            </button>
            <button type="submit" class="flex-1 px-4 py-2.5 rounded-lg bg-palette-forest-dark text-white hover:bg-palette-forest-darker transition text-sm font-medium">
              Envoyer la demande
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <p class="absolute bottom-4 left-1/2 -translate-x-1/2 text-xs text-stone-400">Mockup B — Champs Prénom / Nom en tête du formulaire (préremplis si profil complet)</p>
</body>
</html>
