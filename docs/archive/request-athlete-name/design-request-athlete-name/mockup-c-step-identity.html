<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mockup C — Étape 1 : Comment vous appeler ?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'palette-forest-dark': '#627e59',
            'palette-forest-darker': '#506648',
            'palette-olive': '#8e9856',
            'palette-danger': '#c0564b',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center p-4">
  <div class="fixed inset-0 bg-stone-900/50 backdrop-blur-sm z-[90]" aria-hidden="true"></div>
  <div class="relative z-[100] w-full max-w-md">
    <div class="bg-white rounded-xl shadow-xl border border-stone-100">
      <div class="flex justify-end p-3 bg-white rounded-t-xl">
        <button type="button" class="p-2 rounded-lg hover:bg-stone-200 transition text-stone-500" aria-label="Fermer">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="px-8 pb-8">
        <!-- Indicateur d’étape (optionnel) -->
        <div class="flex justify-center gap-2 mb-6">
          <span class="w-2 h-2 rounded-full bg-palette-forest-dark" title="Étape 1"></span>
          <span class="w-2 h-2 rounded-full bg-stone-200" title="Étape 2"></span>
        </div>
        <h2 id="modal-title" class="text-2xl font-semibold text-stone-900 text-center mb-2">
          Comment vous appeler ?
        </h2>
        <p class="text-sm text-stone-600 text-center mb-8">
          Le coach aura besoin de votre prénom et nom pour personnaliser son accompagnement.
        </p>

        <form class="space-y-5">
          <div>
            <label for="first_name" class="block text-sm font-medium text-stone-700 mb-2">Prénom</label>
            <input type="text" id="first_name" name="first_name" placeholder="Jean" value=""
              class="w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:border-transparent" />
          </div>
          <div>
            <label for="last_name" class="block text-sm font-medium text-stone-700 mb-2">Nom</label>
            <input type="text" id="last_name" name="last_name" placeholder="Dupont" value=""
              class="w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:border-transparent" />
          </div>
          <div class="pt-2">
            <button type="submit" class="w-full px-4 py-2.5 rounded-lg bg-palette-forest-dark text-white hover:bg-palette-forest-darker transition text-sm font-medium">
              Continuer
            </button>
          </div>
        </form>
        <p class="text-xs text-stone-500 text-center mt-6">
          Ensuite : sports pratiqués, besoin et choix de l’offre.
        </p>
      </div>
    </div>
  </div>
  <p class="absolute bottom-4 left-1/2 -translate-x-1/2 text-xs text-stone-400">Mockup C — Étape 1 (profil incomplet). Après « Continuer » → étape 2 = formulaire de demande actuel.</p>
</body>
</html>
