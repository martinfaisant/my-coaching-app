<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mockup – Réinitialisation mot de passe (Solution 2 – Contexte + lien)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'palette-forest-dark': '#627e59',
            'palette-forest-darker': '#506648',
            'palette-olive': '#8e9856',
            'palette-forest-light': '#e8ebe0',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex flex-col bg-gradient-to-br from-stone-50 to-stone-200 text-stone-900 antialiased">
  <!-- ========== SOLUTION 2 : Contexte explicite + lien de retour ========== -->
  <main class="flex-1 flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md">
      <!-- Bloc de contexte au-dessus de la carte -->
      <div class="flex flex-col items-center gap-2 mb-4">
        <p class="text-sm font-medium text-stone-600">My Sport Ally</p>
        <h2 class="text-lg font-semibold text-stone-800">Réinitialisation du mot de passe</h2>
        <a href="#" class="text-sm text-palette-forest-dark hover:text-palette-forest-darker font-medium underline underline-offset-2">
          ← Retour à l’accueil
        </a>
      </div>

      <div class="bg-white rounded-2xl shadow-xl border-2 border-palette-forest-dark overflow-hidden">
        <div class="p-8 sm:p-10">
          <h1 class="text-2xl font-semibold text-stone-900 text-center mb-1">
            Nouveau mot de passe
          </h1>
          <p class="text-stone-400 text-sm text-center mb-6">
            Choisissez un mot de passe sécurisé pour votre compte.
          </p>

          <form class="space-y-5">
            <div>
              <label for="new-password" class="block text-sm font-medium text-stone-700 mb-2">Nouveau mot de passe</label>
              <input id="new-password" name="password" type="password" autocomplete="new-password" required minlength="6" placeholder="••••••••"
                class="w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:border-transparent" />
            </div>
            <div>
              <label for="confirm-password" class="block text-sm font-medium text-stone-700 mb-2">Confirmer le mot de passe</label>
              <input id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required minlength="6" placeholder="••••••••"
                class="w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:border-transparent" />
            </div>
            <button type="submit" class="w-full px-4 py-2.5 rounded-lg bg-palette-forest-dark text-white font-medium hover:bg-palette-forest-darker focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:ring-offset-2 transition">
              Définir le mot de passe
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <p class="text-center text-xs text-stone-400 py-4">Solution 2 – Contexte + lien retour (design system : même carte, titre + lien au-dessus, Button, Input)</p>
</body>
</html>
