<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mockup – Réinitialisation mot de passe (Solution 1 – En-tête)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'palette-forest-dark': '#627e59',
            'palette-forest-darker': '#506648',
            'palette-olive': '#8e9856',
            'palette-forest-light': '#e8ebe0',
            'background': '#fafaf9',
          }
        }
      }
    }
  </script>
  <style>
    /* Même fond que la page d'accueil : bg-background/95 */
    .header-home { background-color: rgba(250, 250, 249, 0.95); }
  </style>
  <!-- Même en-tête que la page d'accueil (app/[locale]/page.tsx) : header + LanguageSwitcher + AuthButtons -->
</head>
<body class="min-h-screen flex flex-col bg-gradient-to-br from-stone-50 to-stone-200 text-stone-900 antialiased">
  <!-- ========== SOLUTION 1 : Même en-tête que la page d'accueil ========== -->
  <header class="header-home sticky top-0 z-50 border-b border-stone-200 backdrop-blur-md shrink-0">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <a href="#" class="text-xl font-semibold text-stone-900 tracking-tight flex items-center gap-2">
        <img src="/logo.svg" alt="My Sport Ally" class="h-9 w-auto object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';" />
        <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-palette-forest-dark text-white font-bold text-sm" style="display:none;">MSA</span>
        <span class="hidden sm:inline">My Sport Ally</span>
      </a>
      <div class="flex items-center gap-4">
        <!-- LanguageSwitcher (même rendu que components/LanguageSwitcher.tsx) -->
        <button type="button" class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-stone-600 hover:text-stone-900 hover:bg-stone-50 transition-all text-sm font-medium border border-transparent focus:outline-none focus:ring-2 focus:ring-stone-300 focus:ring-offset-2" aria-label="Changer de langue">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
          <span>FR</span>
          <svg class="w-3 h-3 shrink-0 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div class="h-6 w-px bg-stone-200" aria-hidden></div>
        <!-- AuthButtons (même rendu que components/AuthButtons.tsx, variant default) -->
        <div class="flex items-center gap-2.5">
          <a href="#" class="rounded-lg min-h-10 px-4 py-2.5 text-sm font-medium text-stone-700 hover:bg-stone-100 transition-colors focus:outline-none">Se connecter</a>
          <a href="#" class="rounded-lg min-h-10 px-4 py-2.5 text-sm font-medium text-white bg-palette-forest-dark hover:bg-palette-olive transition-colors focus:outline-none">Créer un compte</a>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl shadow-xl border-2 border-palette-forest-dark overflow-hidden">
        <div class="p-8 sm:p-10">
          <h1 class="text-2xl font-semibold text-stone-900 text-center mb-1">
            Nouveau mot de passe
          </h1>
          <p class="text-stone-400 text-sm text-center mb-6">
            Choisissez un mot de passe sécurisé pour votre compte.
          </p>

          <form class="space-y-5">
            <div>
              <label for="new-password" class="block text-sm font-medium text-stone-700 mb-2">Nouveau mot de passe</label>
              <input id="new-password" name="password" type="password" autocomplete="new-password" required minlength="6" placeholder="••••••••"
                class="w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:border-transparent" />
            </div>
            <div>
              <label for="confirm-password" class="block text-sm font-medium text-stone-700 mb-2">Confirmer le mot de passe</label>
              <input id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required minlength="6" placeholder="••••••••"
                class="w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:border-transparent" />
            </div>
            <button type="submit" class="w-full px-4 py-2.5 rounded-lg bg-palette-forest-dark text-white font-medium hover:bg-palette-forest-darker focus:outline-none focus:ring-2 focus:ring-palette-forest-dark focus:ring-offset-2 transition">
              Définir le mot de passe
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <p class="text-center text-xs text-stone-400 py-4">Solution 1 – Même en-tête que la page d’accueil (header, LanguageSwitcher, AuthButtons) ; design system : Button, Input, carte rounded-2xl</p>
</body>
</html>
