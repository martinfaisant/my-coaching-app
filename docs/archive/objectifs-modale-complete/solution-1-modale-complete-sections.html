<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mockup – Solution 1 : Modale complète (sections Objectif + Résultat)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'palette-forest-dark': '#627e59',
            'palette-forest-darker': '#506648',
            'palette-sage': '#aaaa51',
            'palette-amber': '#c9a544',
            'palette-danger': '#c0564b',
          }
        }
      }
    }
  </script>
  <style>
    .form-input { @apply w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400; }
    .form-input:focus { outline: none; box-shadow: 0 0 0 2px #627e59; border-color: transparent; }
    .form-textarea { @apply w-full px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-900 placeholder-stone-400 resize-y min-h-[80px]; }
    .form-textarea:focus { outline: none; box-shadow: 0 0 0 2px #627e59; border-color: transparent; }
  </style>
</head>
<body class="bg-stone-100 text-stone-900 min-h-screen p-6">

  <div class="max-w-2xl mx-auto space-y-4 mb-8">
    <h1 class="text-xl font-bold text-stone-800">Solution 1 – Modale complète (2 sections)</h1>
    <p class="text-sm text-stone-600">Un seul bouton « Modifier » sur la tuile. La modale affiche la section Objectif puis la section Résultat (visible uniquement si date passée). Un bouton Enregistrer en bas.</p>
  </div>

  <!-- Overlay + Modale -->
  <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50" aria-modal="true" role="dialog">
    <div class="bg-white rounded-2xl shadow-xl border border-stone-200 w-full max-w-xl overflow-hidden flex flex-col max-h-[90vh] role="document">
      <!-- Header -->
      <div class="shrink-0 px-6 py-4 border-b border-stone-200 flex items-center justify-between gap-3">
        <h2 class="text-lg font-bold text-stone-900">Modifier l'objectif</h2>
        <button type="button" class="p-2 rounded-lg text-stone-500 hover:bg-stone-100 shrink-0" aria-label="Fermer">✕</button>
      </div>
      <!-- Body scrollable -->
      <div class="overflow-y-auto px-6 py-4 space-y-8">
        <!-- Section Objectif -->
        <section>
          <h3 class="text-xs font-bold text-stone-500 uppercase tracking-wide mb-3">Objectif</h3>
          <div class="space-y-5">
            <div>
              <label for="race_name" class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5 ml-1">Nom de la course *</label>
              <input id="race_name" name="race_name" type="text" placeholder="Ex: Marathon de..." class="form-input" value="Semi-marathon de Lyon" />
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label for="date" class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5 ml-1">Date de la course *</label>
                <input id="date" name="date" type="date" class="form-input" value="2025-03-15" />
              </div>
              <div>
                <label for="distance" class="block text-xs font-bold text-stone-500 uppercase tracking-wide mb-1.5 ml-1">Distance (km) *</label>
                <input id="distance" name="distance" type="number" min="0" step="0.1" placeholder="42" class="form-input" value="21.1" />
              </div>
            </div>
            <div>
              <label class="block text-xs font-bold text-stone-500 uppercase mb-2 ml-1">Priorité</label>
              <div class="grid grid-cols-2 gap-2">
                <label class="cursor-pointer">
                  <input type="radio" name="is_primary" value="primary" checked class="hidden peer" />
                  <div class="flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg border text-[10px] font-bold bg-white text-amber-600 border-amber-400">Principal</div>
                </label>
                <label class="cursor-pointer">
                  <input type="radio" name="is_primary" value="secondary" class="hidden peer" />
                  <div class="flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg border text-[10px] font-bold bg-white text-stone-400 border-stone-200">Secondaire</div>
                </label>
              </div>
            </div>
            <div>
              <label class="block text-xs font-bold text-stone-500 uppercase tracking-wide ml-1">Objectif de temps (facultatif)</label>
              <div class="grid grid-cols-3 gap-2 mt-2">
                <div class="relative">
                  <input name="target_time_hours" type="number" min="0" max="99" placeholder="" class="form-input text-center pr-9" />
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-stone-500 pointer-events-none">h</span>
                </div>
                <div class="relative">
                  <input name="target_time_minutes" type="number" min="0" max="59" placeholder="" class="form-input text-center pr-10" />
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-stone-500 pointer-events-none">min</span>
                </div>
                <div class="relative">
                  <input name="target_time_seconds" type="number" min="0" max="59" placeholder="" class="form-input text-center pr-8" />
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-stone-500 pointer-events-none">s</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Section Résultat (visible si objectif passé) -->
        <section class="pt-4 border-t border-stone-200">
          <h3 class="text-xs font-bold text-stone-500 uppercase tracking-wide mb-3">Résultat</h3>
          <div class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-2">Temps réalisé <span class="text-palette-danger">*</span></label>
              <div class="grid grid-cols-3 gap-3">
                <div class="relative">
                  <input name="result_time_hours" type="number" min="0" max="99" placeholder="" class="form-input text-center pr-9" />
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-stone-500 pointer-events-none">h</span>
                </div>
                <div class="relative">
                  <input name="result_time_minutes" type="number" min="0" max="59" placeholder="" class="form-input text-center pr-10" />
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-stone-500 pointer-events-none">min</span>
                </div>
                <div class="relative">
                  <input name="result_time_seconds" type="number" min="0" max="59" placeholder="" class="form-input text-center pr-8" />
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-stone-500 pointer-events-none">s</span>
                </div>
              </div>
            </div>
            <div>
              <label for="result_place" class="block text-sm font-medium text-stone-700 mb-2">Place (facultatif)</label>
              <input id="result_place" name="result_place" type="number" min="1" placeholder="42" class="form-input" />
            </div>
            <div>
              <label for="result_note" class="block text-sm font-medium text-stone-700 mb-2">Note (facultatif)</label>
              <textarea id="result_note" name="result_note" placeholder="Conditions, ressenti…" class="form-textarea" rows="3"></textarea>
            </div>
          </div>
        </section>
      </div>
      <!-- Footer -->
      <div class="shrink-0 border-t border-stone-200 px-6 py-4 flex gap-3 bg-white">
        <button type="button" class="flex-1 px-4 py-2.5 rounded-lg border border-stone-300 bg-white text-stone-700 font-medium hover:bg-stone-50 transition">Annuler</button>
        <button type="submit" class="flex-1 px-4 py-2.5 rounded-lg bg-palette-forest-dark text-white font-medium hover:bg-palette-forest-darker transition">Enregistrer</button>
      </div>
    </div>
  </div>

</body>
</html>
