<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>US2 — Pied de page accueil : lien Contact</title>
    <style>
      :root {
        --muted: #57534e;
        --border: #e7e5e4;
        --bg: #fafaf9;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #fff;
      }
      .hint {
        font-size: 12px;
        color: #78716c;
        padding: 16px;
        background: #fffbeb;
        border-bottom: 1px solid #fde68a;
      }
      footer {
        border-top: 1px solid var(--border);
        background: var(--bg);
        padding: 48px 20px;
      }
      .inner {
        max-width: 80rem;
        margin: 0 auto;
        text-align: center;
        color: var(--muted);
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px 24px;
        font-size: 14px;
        margin-bottom: 12px;
      }
      a {
        color: var(--muted);
        text-decoration: underline;
        text-underline-offset: 4px;
      }
      a:hover {
        color: #0c0a09;
      }
      .copy {
        font-size: 14px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <p class="hint">
      Mockup US2 — Le lien « Contact » / « Nous contacter » s’aligne visuellement sur Confidentialité et CGU (même style,
      ordre à confirmer : ex. Confidentialité · CGU · Contact).
    </p>
    <footer>
      <div class="inner">
        <div class="links">
          <a href="#">Politique de confidentialité</a>
          <a href="#">Conditions d’utilisation</a>
          <a href="#"><strong>Contact</strong></a>
        </div>
        <p class="copy">© 2026 My Sport Ally. Tous droits réservés.</p>
      </div>
    </footer>
  </body>
</html>
