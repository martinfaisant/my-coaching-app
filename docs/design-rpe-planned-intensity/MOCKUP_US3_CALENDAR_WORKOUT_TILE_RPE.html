<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>US-RPE-03 — Tuile calendrier : badge RPE neutre</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'palette-forest-dark': '#627e59',
            stone: { 50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1', 400: '#a8a29e', 500: '#78716c', 600: '#57534e', 900: '#1c1917' },
          },
        },
      },
    }
  </script>
</head>
<body class="bg-stone-200 min-h-screen p-4 space-y-8">
  <p class="text-center text-xs text-stone-600 max-w-xl mx-auto">
    <strong>US-RPE-03</strong> — Bordure gauche = couleur <strong>sport</strong> uniquement (ex. course). Badge RPE = neutre <code class="text-stone-500">stone</code>, compact.
  </p>

  <div class="max-w-md mx-auto space-y-4">
    <h2 class="text-xs font-bold text-stone-600 uppercase tracking-widest">Avec RPE prévu</h2>
    <div class="bg-white rounded-lg shadow-sm border border-stone-100 border-l-4 border-l-palette-forest-dark p-2.5 min-h-[88px] flex flex-col justify-between">
      <div class="flex justify-between items-start gap-1">
        <span class="text-[11px] font-semibold text-stone-900 leading-tight">Sortie tempo · 45′</span>
        <span class="shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded bg-stone-100 text-stone-600 border border-stone-200" title="Intensité prévue RPE 7">RPE 7</span>
      </div>
      <div class="text-[10px] text-stone-500 mt-1">10 km · EF</div>
    </div>

    <h2 class="text-xs font-bold text-stone-600 uppercase tracking-widest">Sans RPE (pas de badge)</h2>
    <div class="bg-white rounded-lg shadow-sm border border-stone-100 border-l-4 border-l-palette-forest-dark p-2.5 min-h-[88px] flex flex-col justify-between">
      <span class="text-[11px] font-semibold text-stone-900 leading-tight">Sortie longue</span>
      <div class="text-[10px] text-stone-500 mt-1">2 h · 22 km</div>
    </div>

    <h2 class="text-xs font-bold text-stone-600 uppercase tracking-widest">Variante compacte (seulement le chiffre)</h2>
    <div class="bg-white rounded-lg shadow-sm border border-stone-100 border-l-4 border-l-palette-forest-dark p-2.5 flex flex-col justify-between">
      <div class="flex justify-between items-start gap-1">
        <span class="text-[11px] font-semibold text-stone-900 leading-tight">VMA</span>
        <span class="shrink-0 w-6 h-6 rounded-full bg-stone-100 text-stone-700 text-[10px] font-bold flex items-center justify-center border border-stone-200" title="RPE 9">9</span>
      </div>
      <div class="text-[10px] text-stone-500 mt-1">45′</div>
    </div>
  </div>
</body>
</html>
